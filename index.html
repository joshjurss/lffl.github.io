<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Largeman Fantasy Football League World Cup 2026 Extravaganza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:#0B1F3A;--red:#C8102E;--gold:#F0A500;--pitch:#1A5E35;
      --white:#FFFFFF;--off:#F5F6F8;--muted:#6B7280;--border:#D1D9E0;
      --correct:#1A5E35;--wrong:#C8102E;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--off);color:var(--navy);min-height:100vh;}
    header{background:var(--navy);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em;color:var(--white);display:flex;align-items:center;gap:10px;}
    .logo span{color:var(--gold);}
    nav{display:flex;gap:4px;}
    nav button{background:none;border:none;color:rgba(255,255,255,.6);font-family:'Inter',sans-serif;font-size:.85rem;font-weight:500;padding:8px 14px;border-radius:6px;cursor:pointer;transition:background .15s,color .15s;}
    nav button:hover{background:rgba(255,255,255,.1);color:var(--white);}
    nav button.active{background:var(--red);color:var(--white);}
    .standings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;margin-top:1.5rem;}
    .fm-card{background:var(--white);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);}
    .fm-header{background:#1e2532;color:var(--white);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 14px;}
    .fm-table{width:100%;border-collapse:collapse;font-size:.78rem;}
    .fm-table thead th{color:#9ba3af;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:5px 6px;text-align:center;border-bottom:1px solid #f0f2f5;}
    .fm-table thead th.th-team{text-align:left;padding-left:10px;}
    .fm-table tbody tr{border-bottom:1px solid #f0f2f5;transition:background .1s;}
    .fm-table tbody tr:last-child{border-bottom:none;}
    .fm-table tbody tr:hover{background:#fafbfc;}
    .fm-table tbody tr.fm-advance{border-left:3px solid #4caf50;}
    .fm-table tbody tr.fm-advance td:first-child{padding-left:7px;}
    .fm-table tbody tr.fm-cutoff{border-bottom:2px dashed #d1d9e0;}
    .fm-table td{padding:8px 6px;text-align:center;color:#374151;}
    .fm-table td.td-pos{color:#9ba3af;font-size:.7rem;font-weight:600;width:20px;}
    .fm-table td.td-team{text-align:left;padding-left:10px;font-weight:600;white-space:nowrap;}
    .fm-table td.td-flag{padding-right:0;width:22px;font-size:1rem;line-height:1;}
    .fm-table td.td-pts{font-weight:700;color:#1e2532;}
    .fm-table td.td-gd.pos{color:#4caf50;font-weight:600;}
    .fm-table td.td-gd.neg{color:#ef4444;font-weight:600;}
    .fm-no-data{color:var(--muted);font-style:italic;padding:14px;font-size:.82rem;}
    .view{display:none;max-width:1100px;margin:0 auto;padding:2rem 1.5rem;}
    .view.active{display:block;}
    h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.04em;}
    h1 span{color:var(--red);}
    .subtitle{color:var(--muted);font-size:.9rem;margin-top:4px;margin-bottom:1.5rem;}
    .lb-table{background:var(--white);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
    .lb-row{display:grid;grid-template-columns:52px 1fr 110px;align-items:center;padding:0 1.25rem 0 0;height:68px;border-bottom:1px solid var(--border);transition:background .15s;border-left:4px solid transparent;}
    .lb-row:last-child{border-bottom:none;}
    .lb-row.data-row:hover{background:var(--off);cursor:pointer;}
    .lb-row.header-row{height:38px;background:var(--navy);color:rgba(255,255,255,.55);font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-left:4px solid var(--navy);}
    .lb-row.rank-1{background:linear-gradient(90deg,#FFFBEB 0%,transparent 55%);border-left-color:#F0A500;}
    .lb-row.rank-2{background:linear-gradient(90deg,#F4F5F6 0%,transparent 55%);border-left-color:#9CA3AF;}
    .lb-row.rank-3{background:linear-gradient(90deg,#FDF3EC 0%,transparent 55%);border-left-color:#CD7F32;}
    .rank-badge{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--muted);text-align:center;padding-left:1rem;}
    .rank-badge.r1{color:#F0A500;}.rank-badge.r2{color:#9CA3AF;}.rank-badge.r3{color:#CD7F32;}
    .player-name{font-weight:600;font-size:.97rem;display:flex;align-items:center;gap:11px;}
    .avatar{width:34px;height:34px;border-radius:50%;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;letter-spacing:.02em;}
    .avatar.r1{background:linear-gradient(135deg,#F0A500,#FFD060);color:var(--navy);}
    .avatar.r2{background:linear-gradient(135deg,#8A9299,#BEC4CA);color:var(--white);}
    .avatar.r3{background:linear-gradient(135deg,#A0622A,#D4875A);color:var(--white);}
    .champ-pick{font-size:.78rem;color:var(--muted);margin-top:2px;}
    .pts-cell{text-align:right;}
    .pts-cell .big{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--navy);line-height:1;}
    .pts-cell .label{font-size:.65rem;color:var(--muted);display:block;letter-spacing:.04em;text-transform:uppercase;}
    .lb-champ-cell{display:flex;align-items:center;gap:10px;justify-content:flex-end;}
    .lb-champ-flag{font-size:1.6rem;line-height:1;flex-shrink:0;}
    .lb-champ-name{font-size:.8rem;font-weight:600;color:var(--navy);text-align:right;line-height:1.2;}
    .view-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:.78rem;font-weight:500;cursor:pointer;color:var(--navy);transition:background .12s;white-space:nowrap;}
    .view-btn:hover{background:var(--navy);color:var(--white);border-color:var(--navy);}
    .person-selector{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:2rem;}
    .person-chip{padding:7px 16px;border-radius:999px;border:1px solid var(--border);background:var(--white);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .12s;}
    .person-chip:hover{border-color:var(--navy);}
    .person-chip.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
    .section-label{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.06em;color:var(--white);background:var(--navy);padding:6px 14px;border-radius:6px;margin-bottom:1rem;display:inline-block;}
    .score-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:2rem;}
    .score-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center;}
    .score-card .num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--navy);line-height:1;}
    .score-card .lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
    .score-card .sub{font-size:.72rem;color:var(--muted);margin-top:2px;}
    .groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:2.5rem;}
    .group-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .group-card-header{background:var(--pitch);color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.06em;padding:6px 12px;}
    .group-team{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;font-size:.84rem;border-bottom:1px solid var(--border);}
    .group-team:last-child{border-bottom:none;}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .dot.correct{background:var(--correct);}.dot.wrong{background:var(--wrong);}.dot.pending{background:#C5CBD3;}
    .bracket-scroll{overflow-x:auto;padding-bottom:1.5rem;margin-bottom:2rem;}
    .bracket-tree{display:flex;align-items:stretch;position:relative;min-width:1200px;}
    .b-round{display:flex;flex-direction:column;flex:1;min-width:0;}
    .b-round-label{font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.07em;color:var(--muted);text-align:center;padding:6px 4px 10px;white-space:nowrap;}
    .b-slots{flex:1;display:flex;flex-direction:column;}
    .b-match-group{flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;min-height:20px;}
    .b-team{margin:1px 3px 1px 6px;padding:3px 6px;background:var(--white);border:1.5px solid var(--border);border-radius:4px;font-size:.65rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;z-index:1;}
    .b-team.winner{background:#EDF7F1;border-color:#52B788;color:var(--correct);font-weight:600;}
    .b-team.loser{color:#ef4444;background:#FEF2F2;border-color:#ef4444;}
    .b-team.empty{color:#C5CBD3;border-style:dashed;font-style:italic;}
    .b-pts{font-size:.6rem;color:var(--correct);margin-left:4px;font-weight:700;}
    .b-svg{position:absolute;inset:0;pointer-events:none;overflow:visible;}
    .b-champ-col{flex:0 0 120px;display:flex;flex-direction:column;align-items:stretch;padding-left:8px;}
    .b-champ-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .champ-card{background:var(--white);border:2px solid var(--gold);border-radius:10px;padding:12px;text-align:center;width:100%;}
    .champ-card.won{background:#FFFBEB;}
    .champ-card .trophy{font-size:1.6rem;}
    .champ-card .clbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-top:4px;}
    .champ-card .cteam{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.04em;margin-top:2px;}
    .round-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;background:var(--white);border-radius:10px;padding:10px 16px;border:1px solid var(--border);}
    .round-arrow{background:none;border:1px solid var(--border);border-radius:6px;padding:7px 16px;cursor:pointer;font-size:1rem;color:var(--navy);transition:background .12s,color .12s;}
    .round-arrow:hover:not(:disabled){background:var(--navy);color:var(--white);}
    .round-arrow:disabled{opacity:.3;cursor:default;}
    .round-title-text{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;color:var(--navy);}
    .round-dot-row{display:flex;gap:5px;align-items:center;justify-content:center;margin-top:4px;}
    .round-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .15s;}
    .round-dot.active{background:var(--navy);}
    .matchup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:1.5rem;}
    .matchup-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .matchup-team{display:flex;align-items:center;gap:7px;padding:9px 12px;font-size:.84rem;font-weight:500;color:#374151;}
    .matchup-team+.matchup-team{border-top:1px dashed var(--border);}
    .matchup-team.winner{background:#EDF7F1;color:var(--correct);border-left:3px solid #52B788;}
    .matchup-team.loser{color:#ef4444;background:#FEF2F2;border-left:3px solid #ef4444;}
    .matchup-team.empty{color:#C5CBD3;font-style:italic;}
    .pick-pts{font-size:.7rem;font-weight:700;color:var(--correct);margin-left:auto;}
    .champ-solo{display:flex;justify-content:center;padding:2rem 0;}
    .champ-solo .champ-card{max-width:200px;}
    .flag-emoji{display:none;}
    .flag-img{display:inline;}
    @media(max-width:768px){.flag-img{display:none;}.flag-emoji{display:inline;}}
    .games-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:var(--white);font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:background .15s;margin-left:8px;}
    .games-btn:hover{background:rgba(255,255,255,.22);}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:199;cursor:pointer;}
    .sidebar-overlay.open{display:block;}
    .sidebar{position:fixed;top:0;right:-340px;width:320px;max-width:100vw;height:100vh;background:var(--white);box-shadow:-4px 0 24px rgba(0,0,0,.18);z-index:200;transition:right .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
    .sidebar.open{right:0;}
    .sidebar-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--navy);color:var(--white);flex-shrink:0;}
    .sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;}
    .sidebar-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:4px;line-height:1;}
    .sidebar-close:hover{background:rgba(255,255,255,.12);}
    .sidebar-body{flex:1;overflow-y:auto;padding:10px;}
    .game-card{background:var(--off);border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border);}
    .game-card.live{border-color:#ef4444;background:#fff8f8;}
    .game-card.final{opacity:.75;}
    .game-meta{font-size:.7rem;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:6px;}
    .live-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    .live-label{color:#ef4444;font-weight:700;font-size:.7rem;}
    .game-team{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.84rem;}
    .game-name{flex:1;font-weight:500;}
    .game-score{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--muted);min-width:14px;text-align:right;}
    .game-score.lead{color:var(--navy);}
    .sidebar-empty{padding:1.5rem 1rem;color:var(--muted);font-style:italic;font-size:.88rem;}
    @media(max-width:600px){.sidebar{width:100vw;right:-100vw;}}
    @media(max-width:768px){
      .lb-row{grid-template-columns:44px 1fr 72px;}
      .lb-champ-col{display:none;}
      .standings-grid{grid-template-columns:1fr;}
      .view{padding:1.5rem 1rem;}
      h1{font-size:1.9rem;}
    }
    @media(max-width:600px){
      header{height:auto;padding:.5rem 1rem;flex-wrap:wrap;gap:4px;}
      .logo{font-size:1.3rem;width:100%;}
      .games-btn{width:100%;text-align:center;margin-left:0;}
      nav{width:100%;justify-content:center;}
      nav button{font-size:.78rem;padding:7px 10px;}
      .lb-row{grid-template-columns:32px minmax(0,1fr) 56px;padding:0 .6rem;height:48px;}.rank-badge{padding-left:.25rem;font-size:1.1rem;}
      .lb-row.header-row{height:34px;font-size:.65rem;}
      .player-name{font-size:.85rem;gap:0;overflow:hidden;}
      .player-name>div{overflow:hidden;min-width:0;}
      .player-name>div>div:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
      .avatar{display:none;}
      .pts-cell .big{font-size:1.1rem;}
      .champ-pick{display:none;}
      .view-btn{font-size:.7rem;padding:4px 8px;}
      /* Hide W/D/L/GF/GA in standings table — keep P, GD, Pts */
      .fm-table th:nth-child(5),.fm-table td:nth-child(5),
      .fm-table th:nth-child(6),.fm-table td:nth-child(6),
      .fm-table th:nth-child(7),.fm-table td:nth-child(7),
      .fm-table th:nth-child(8),.fm-table td:nth-child(8),
      .fm-table th:nth-child(9),.fm-table td:nth-child(9){display:none;}
      .groups-grid{grid-template-columns:repeat(2,1fr);}
      .score-summary{grid-template-columns:repeat(2,1fr);}
      .person-chip{padding:5px 12px;font-size:.78rem;}
      .section-label{font-size:.9rem;}
    }
  </style>
</head>
<body>
<header>
  <div class="logo">⚽ LFFL WC<span>2026</span> Extravaganza</div>
  <nav>
    <button class="active" data-view="leaderboard">Leaderboard</button>
    <button data-view="brackets">Brackets</button>
    <button data-view="standings">World Cup Table</button>
  </nav>
  <button class="games-btn" onclick="toggleSidebar()">📅 Matches</button>
</header>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-hd">
    <span class="sidebar-title">📅 Today's Matches</span>
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sidebar-body" id="games-list"><div class="sidebar-empty">Loading…</div></div>
</div>
<div id="leaderboard" class="view active">
  <h1>Group <span>Standings</span></h1>
  <p class="subtitle" id="lb-subtitle"></p>
  <div class="lb-table">
    <div class="lb-row header-row">
      <div>#</div><div>Player</div>
      <div class="pts-cell" style="text-align:right">Points</div>
    </div>
    <div id="lb-body"></div>
  </div>
</div>
<div id="standings" class="view">
  <h1>World Cup <span>Table</span></h1>
  <p class="subtitle" id="standings-subtitle"></p>
  <div class="standings-grid" id="standings-grid"></div>
  <div style="margin-top:2.5rem">
    <div class="section-label" style="margin-bottom:1.5rem">Knockout Bracket</div>
    <div id="wc-bracket-body"></div>
  </div>
</div>
<div id="brackets" class="view">
  <div class="person-selector" id="person-tabs"></div>
  <div id="bracket-body"></div>
</div>

<script src="data.js"></script>
<script>

// ══════════════════════════════════════════════════════════════
//  SCORING ENGINE
// ══════════════════════════════════════════════════════════════
function normalize(t){
  if(!t)return"";
  var a={"czech republic":"czechia","czechia":"czechia","turkey":"turkey","türkiye":"turkey","turkiye":"turkey","ivory coast":"ivory coast","côte d'ivoire":"ivory coast","cote d'ivoire":"ivory coast","dr congo":"dr congo","congo dr":"dr congo","curacao":"curacao","curaçao":"curacao","usa":"united states","south korea":"south korea","korea republic":"south korea"};
  var l=t.toLowerCase().trim();return a[l]||l;
}
function teamsMatch(a,b){return normalize(a)===normalize(b);}
function groupIsComplete(g){return g&&g[0]&&g[1];}
function scoreGroupStage(picks,actual){
  var groups=["groupA","groupB","groupC","groupD","groupE","groupF","groupG","groupH","groupI","groupJ","groupK","groupL"];
  var pts=0,correct=0,total=0;
  for(var i=0;i<groups.length;i++){
    var g=groups[i];
    var pg=(picks.groupStage&&picks.groupStage[g])||[];
    if(!pg.length)continue;
    // Use ACTUAL_RESULTS once group is complete, otherwise use live standings
    var ag=actual[g]||[];
    if(groupIsComplete(ag)){
      var adv=ag.filter(Boolean);
      for(var j=0;j<adv.length;j++){
        total+=SCORING.groupStage;
        for(var k=0;k<pg.length;k++){if(teamsMatch(pg[k],adv[j])){pts+=SCORING.groupStage;correct++;break;}}
      }
    } else {
      // Live scoring: 1pt per pick currently showing a green circle
      var liveTop2=(LIVE_STANDINGS[g]||[]).filter(Boolean);
      var hasLiveData=liveTop2.length>0;
      if(!hasLiveData)continue;
      for(var k=0;k<pg.length;k++){
        var team=pg[k];
        var inTop2=liveTop2.some(function(a){return teamsMatch(team,a);});
        var inThirds=LIVE_THIRDS.some(function(a){return teamsMatch(team,a);});
        if(inTop2||inThirds){pts+=SCORING.groupStage;correct++;}
        total+=SCORING.groupStage;
      }
    }
  }
  return{pts:pts,correct:correct,total:total};
}
function scoreRound(picks,actual,roundKey,pts){
  var p=0,c=0,t=0,ar=actual[roundKey],pr=picks[roundKey];
  if(!ar||!pr)return{pts:p,correct:c,total:t};
  var actualTeams=Object.values(ar).filter(Boolean);
  if(actualTeams.length===0)return{pts:p,correct:c,total:t};
  Object.keys(pr).forEach(function(k){
    var pi=pr[k];if(!pi)return;
    t+=pts;
    if(actualTeams.some(function(a){return teamsMatch(pi,a);})){p+=pts;c++;}
  });
  return{pts:p,correct:c,total:t};
}
function computeScore(id){
  var picks=BRACKET_PICKS[id];if(!picks)return null;
  var gs=scoreGroupStage(picks,ACTUAL_RESULTS);
  var r32=scoreRound(picks,ACTUAL_RESULTS,"roundOf32",SCORING.roundOf32);
  var r16=scoreRound(picks,ACTUAL_RESULTS,"roundOf16",SCORING.roundOf16);
  var qf=scoreRound(picks,ACTUAL_RESULTS,"quarterFinal",SCORING.quarterFinal);
  var sf=scoreRound(picks,ACTUAL_RESULTS,"semiFinal",SCORING.semiFinal);
  var fn=scoreRound(picks,ACTUAL_RESULTS,"final",SCORING.final);
  var cp=0,cc=0;
  if(ACTUAL_RESULTS.champion&&picks.champion&&teamsMatch(picks.champion,ACTUAL_RESULTS.champion)){cp=SCORING.champion;cc=1;}
  return{total:gs.pts+r32.pts+r16.pts+qf.pts+sf.pts+fn.pts+cp,breakdown:{groupStage:gs,roundOf32:r32,roundOf16:r16,quarterFinal:qf,semiFinal:sf,final:fn,champion:{pts:cp,correct:cc,total:ACTUAL_RESULTS.champion?SCORING.champion:0}}};
}
function getLeaderboard(){
  return PARTICIPANTS.map(function(p){return Object.assign({},p,{score:computeScore(p.id),champion:(BRACKET_PICKS[p.id]&&BRACKET_PICKS[p.id].champion)||"—"});})
    .filter(function(p){return p.score;})
    .sort(function(a,b){return b.score.total-a.score.total;})
    .map(function(p,i){return Object.assign({},p,{rank:i+1});});
}

function renderBracket(personId){
  var picks=BRACKET_PICKS[personId],score=computeScore(personId);
  var body=document.getElementById('bracket-body');
  if(!picks||!score){body.innerHTML='<p style="color:var(--muted);padding:2rem 0">No bracket data yet.</p>';return;}
  var person=PARTICIPANTS.find(function(p){return p.id===personId;});
  var bd=score.breakdown;
  var kPts=bd.roundOf32.pts+bd.roundOf16.pts+bd.quarterFinal.pts+bd.semiFinal.pts+bd.final.pts;
  var kCorr=bd.roundOf32.correct+bd.roundOf16.correct+bd.quarterFinal.correct+bd.semiFinal.correct+bd.final.correct;
  var html='<h2 style="font-family:\'Bebas Neue\',sans-serif;font-size:1.8rem;letter-spacing:.04em;margin-bottom:1rem">'+person.name+'\'s Bracket</h2>';

    '<div class="score-card"><div class="num">'+score.total+'</div><div class="lbl">Total Points</div></div>'+
    '<div class="score-card"><div class="num">'+bd.groupStage.pts+'</div><div class="lbl">Group Stage</div><div class="sub">'+bd.groupStage.correct+' correct</div></div>'+
    '<div class="score-card"><div class="num">'+kPts+'</div><div class="lbl">Knockout</div><div class="sub">'+kCorr+' correct</div></div>'+
    '<div class="score-card"><div style="font-size:1.8rem;line-height:1.1">'+getFlag(picks.champion)+'</div><div class="lbl" style="margin-top:4px">'+(picks.champion||'—')+'</div></div>'+
  '</div>';
  html+='<div class="section-label">Group Stage</div><div class="groups-grid">';
  GROUPS.forEach(function(g){
    var picked=(picks.groupStage&&picks.groupStage[g])||[];
    var live=(LIVE_STANDINGS[g]||[]).filter(Boolean);
    var hasLive=live.length>=2;
    html+='<div class="group-card"><div class="group-card-header">'+GROUP_LABELS[g]+'</div>';
    picked.forEach(function(team){
      var inTop2=live.some(function(a){return normalize(a)===normalize(team);});
      var inThirds=LIVE_THIRDS.some(function(a){return normalize(a)===normalize(team);});
      var s=hasLive?(inTop2||inThirds?'correct':'wrong'):'pending';
      html+='<div class="group-team"><span>'+team+'</span><span class="dot '+s+'"></span></div>';
    });
    html+='</div>';
  });
  html+='</div>';
  html+='<div class="section-label" style="margin-bottom:1.5rem">Knockout Bracket</div>';

}

function renderKnockoutRound(picks){
  var round=KNOCKOUT_ROUNDS[currentKnockoutRound];
  var label=document.getElementById('round-title-label');
  var container=document.getElementById('round-picks');
  var prevBtn=document.getElementById('round-prev');
  var nextBtn=document.getElementById('round-next');
  if(!container)return;
  if(label)label.textContent=round.label;
  if(prevBtn)prevBtn.disabled=currentKnockoutRound===0;
  if(nextBtn)nextBtn.disabled=currentKnockoutRound===KNOCKOUT_ROUNDS.length-1;
  KNOCKOUT_ROUNDS.forEach(function(_,i){var d=document.getElementById('rdot-'+i);if(d)d.className='round-dot'+(i===currentKnockoutRound?' active':'');});
  if(round.key==='champion'){
    var cp=picks.champion||null,ca=ACTUAL_RESULTS.champion||null;
    var cw=ca&&cp&&normalize(cp)===normalize(ca);
    var cpts=cw?'<div style="font-size:.65rem;color:var(--correct);font-weight:700;margin-top:6px">+'+SCORING.champion+' pts</div>':(ca?'<div style="font-size:.65rem;color:var(--wrong);margin-top:6px">'+ca+' won</div>':'');
    container.innerHTML='<div class="champ-solo"><div class="champ-card'+(cw?' won':'')+'"><div class="trophy">🏆</div><div class="clbl">Champion Pick</div><div class="cteam">'+(cp||'—')+'</div>'+cpts+'</div></div>';
  }else{
    var roundActuals=Object.values(ACTUAL_RESULTS[round.key]||{}).filter(Boolean);
    var hasResults=roundActuals.length>0;
    var html='<div class="matchup-grid">';
    for(var i=1;i<=round.n;i+=2){
      var pA=(picks[round.key]&&picks[round.key]['m'+i])||null;
      var pB=(picks[round.key]&&picks[round.key]['m'+(i+1)])||null;
      html+='<div class="matchup-card">'+matchupTeamRow(pA,hasResults,roundActuals,round.pts)+matchupTeamRow(pB,hasResults,roundActuals,round.pts)+'</div>';
    }
    html+='</div>';
    container.innerHTML=html;
  }
}

function matchupTeamRow(pick,hasResults,actuals,pts){
  var correct=pick&&hasResults&&actuals.some(function(a){return normalize(pick)===normalize(a);});
  var cls=!pick?'empty':(!hasResults?'':(correct?'winner':'loser'));
  var ptsHtml=correct&&pts?'<span class="pick-pts">+'+pts+'</span>':'';
  return'<div class="matchup-team '+cls+'">'+(pick?getFlag(pick)+' '+pick:'—')+ptsHtml+'</div>';
}

}

//  TODAY'S MATCHES SIDEBAR
// ══════════════════════════════════════════════════════════════
var sidebarRefreshTimer=null;

function toggleSidebar(){
  var sb=document.getElementById('sidebar'),ov=document.getElementById('sidebar-overlay');
  var opening=!sb.classList.contains('open');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
  if(opening){fetchGames();}else{clearTimeout(sidebarRefreshTimer);}
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
  clearTimeout(sidebarRefreshTimer);
}

function localDateStr(d){
  var y=d.getFullYear();
  var m=String(d.getMonth()+1).padStart(2,'0');
  var day=String(d.getDate()).padStart(2,'0');
  return y+m+day;
}

function fetchGames(){
  clearTimeout(sidebarRefreshTimer);
  var el=document.getElementById('games-list');
  if(!el.children.length)el.innerHTML='<div class="sidebar-empty">Loading…</div>';
  var now=new Date();
  var yesterday=new Date(now);yesterday.setDate(yesterday.getDate()-1);
  var tomorrow=new Date(now);tomorrow.setDate(tomorrow.getDate()+1);
  var dates=[localDateStr(yesterday),localDateStr(now),localDateStr(tomorrow)];
  Promise.all(dates.map(function(dt){
    return fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates='+dt)
      .then(function(r){return r.json();});
  })).then(function(results){
    var seen={},events=[];
    results.forEach(function(data){
      (data.events||[]).forEach(function(e){if(!seen[e.id]){seen[e.id]=true;events.push(e);}});
    });
    events.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    renderGames(events);
    var hasLive=events.some(function(e){
      var s=e.status&&e.status.type&&e.status.type.name||'';
      return s==='STATUS_IN_PROGRESS'||s==='STATUS_HALFTIME';
    });
    var allDone=events.length>0&&events.every(function(e){
      var s=e.status&&e.status.type&&e.status.type.name||'';
      return s==='STATUS_FINAL'||s==='STATUS_FULL_TIME'||s==='STATUS_POSTPONED'||s==='STATUS_CANCELED';
    });
    var sb=document.getElementById('sidebar');
    if(!allDone&&sb&&sb.classList.contains('open')){
      sidebarRefreshTimer=setTimeout(fetchGames,hasLive?30000:60000);
    }
  }).catch(function(){
    el.innerHTML='<div class="sidebar-empty">Could not load matches. Check your connection.</div>';
  });
}

function renderGames(events){
  var el=document.getElementById('games-list');
  if(!events.length){el.innerHTML='<div class="sidebar-empty">No matches scheduled today.</div>';return;}
  var html='';
  var lastDate='';
  events.forEach(function(event){
    var comp=event.competitions&&event.competitions[0];if(!comp)return;
    var home=comp.competitors.find(function(c){return c.homeAway==='home';})||comp.competitors[0];
    var away=comp.competitors.find(function(c){return c.homeAway==='away';})||comp.competitors[1];
    if(!home||!away)return;
    var st=event.status&&event.status.type;
    var stName=st?st.name:'';
    var detail=st?st.shortDetail:'';
    var isLive=stName==='STATUS_IN_PROGRESS'||stName==='STATUS_HALFTIME';
    var isFinal=/STATUS_FINAL|STATUS_FULL_TIME|STATUS_FT/.test(stName);
    var isScheduled=!isLive&&!isFinal;
    var gameDate=new Date(event.date);
    var dateLabel=gameDate.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
    if(dateLabel!==lastDate){
      html+='<div style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 4px 4px">'+(lastDate===''?'':'<br>')+dateLabel+'</div>';
      lastDate=dateLabel;
    }
    var homeName=home.team.displayName||home.team.name||'';
    var awayName=away.team.displayName||away.team.name||'';
    var hScore=home.score,aScore=away.score;
    var hLead=!isScheduled&&parseInt(hScore||0)>parseInt(aScore||0);
    var aLead=!isScheduled&&parseInt(aScore||0)>parseInt(hScore||0);
    html+='<div class="game-card'+(isLive?' live':isFinal?' final':'')+'">';
    html+='<div class="game-meta">';
    if(isLive){html+='<span class="live-dot"></span><span class="live-label">LIVE</span><span>'+detail+'</span>';}
    else if(isFinal){html+='<span style="font-weight:600">FT</span>';}
    else{html+='<span>'+gameDate.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})+'</span>';}
    html+='</div>';
    html+='<div class="game-team">'+getFlag(homeName)+' <span class="game-name">'+homeName+'</span>'+(isScheduled?'':'<span class="game-score'+(hLead?' lead':'')+'">'+hScore+'</span>')+'</div>';
    html+='<div class="game-team">'+getFlag(awayName)+' <span class="game-name">'+awayName+'</span>'+(isScheduled?'':'<span class="game-score'+(aLead?' lead':'')+'">'+aScore+'</span>')+'</div>';
    html+='</div>';
  });
  el.innerHTML=html;
}

// ── KNOCKOUT RESULTS FROM ESPN ────────────────────────────────
// WC 2026 knockout dates: July 5-26, 2026
var KNOCKOUT_DATE_RANGES=['20260628','20260629','20260630','20260701','20260702','20260703','20260704','20260705','20260706','20260707','20260710','20260711','20260716','20260717','20260721','20260722','20260726'];
var ROUND_KEY_MAP={
  'R32':'roundOf32','OF32':'roundOf32','ROUND OF 32':'roundOf32',
  'R16':'roundOf16','OF16':'roundOf16','ROUND OF 16':'roundOf16',
  'QF':'quarterFinal','QUARTERFINAL':'quarterFinal','QUARTER-FINAL':'quarterFinal',
  'SF':'semiFinal','SEMIFINAL':'semiFinal','SEMI-FINAL':'semiFinal',
  'F':'final','FINAL':'final','CHAMPIONSHIP':'final'
};
function detectRoundKey(event){
  // event.season.slug is the reliable source: "round-of-32", "round-of-16", etc.
  var slug=((event.season||{}).slug||'').toLowerCase();
  if(slug&&!/group/.test(slug)){
    if(/32/.test(slug))return'roundOf32';
    if(/16/.test(slug))return'roundOf16';
    if(/quarter/.test(slug))return'quarterFinal';
    if(/semi/.test(slug))return'semiFinal';
    if(/final/.test(slug))return'final';
  }
  // Fallback: altGameNote in competitions[0]
  var comp=(event.competitions&&event.competitions[0])||{};
  var note=(comp.altGameNote||'').toUpperCase();
  if(/32/.test(note))return'roundOf32';
  if(/16/.test(note))return'roundOf16';
  if(/QUARTER/.test(note))return'quarterFinal';
  if(/SEMI/.test(note))return'semiFinal';
  if(/FINAL/.test(note))return'final';
  return null;
}
function fetchKnockoutResults(){
  Promise.all(KNOCKOUT_DATE_RANGES.map(function(dt){
    return fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates='+dt)
      .then(function(r){return r.json();}).catch(function(){return{events:[]};});
  })).then(function(responses){
    var seen={},slots={roundOf32:[],roundOf16:[],quarterFinal:[],semiFinal:[],final:[]};
    responses.forEach(function(data){
      (data.events||[]).forEach(function(event){
        if(seen[event.id])return; seen[event.id]=true;
        var roundKey=detectRoundKey(event);
        if(!roundKey)return;
        var comp=event.competitions&&event.competitions[0];
        if(!comp)return;
        var st=(comp.status&&comp.status.type)||{};
        if(!st.completed)return;
        var competitors=comp.competitors||[];
        if(roundKey==='final'){
          // Store both finalists so both show green in the Final bracket
          competitors.forEach(function(c){
            var name=c.team&&(c.team.displayName||c.team.name);
            if(name)slots.final.push(name);
          });
          var winner=competitors.find(function(c){return c.winner;});
          if(winner){var wn=winner.team&&(winner.team.displayName||winner.team.name);if(wn)ACTUAL_RESULTS.champion=wn;}
        }else{
          var winner=competitors.find(function(c){return c.winner;});
          if(winner){var wn=winner.team&&(winner.team.displayName||winner.team.name);if(wn)slots[roundKey].push(wn);}
        }
      });
    });
    var changed=false;
    ['roundOf32','roundOf16','quarterFinal','semiFinal','final'].forEach(function(key){
      if(!slots[key].length||!ACTUAL_RESULTS[key])return;
      slots[key].forEach(function(team,i){
        if(ACTUAL_RESULTS[key]['m'+(i+1)]!==team){ACTUAL_RESULTS[key]['m'+(i+1)]=team;changed=true;}
      });
    });
    if(changed){
      initLeaderboard();
      var rp=document.getElementById('round-picks');
      if(rp&&currentPerson)renderKnockoutRound(BRACKET_PICKS[currentPerson]);
    }
  }).catch(function(e){console.warn('Could not fetch knockout results:',e);});
}

fetchKnockoutResults();
initLeaderboard();
initBrackets();
initStandings();
</script>
